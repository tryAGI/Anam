          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Tool'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          description: Unauthorized - Invalid or missing API key.
        '500':
          description: Server error.
    post:
      summary: Create tool
      description: Create a new tool for function calling in persona sessions.
      operationId: createTool
      tags:
        - Tools
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - description
                - type
              properties:
                name:
                  type: string
                  description: Unique name for the tool (pattern [a-zA-Z0-9_.-]+).
                description:
                  type: string
                  description: Description of what the tool does.
                type:
                  type: string
                  enum:
                    - CLIENT
                    - SERVER_RAG
                    - SERVER_WEBHOOK
                    - SYSTEM
                  description: Type of tool.
                config:
                  type: object
                  description: Type-specific configuration for the tool.
      responses:
        '201':
          description: Successfully created tool.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tool'
        '400':
          description: Bad request - Invalid tool data.
        '401':
          description: Unauthorized - Invalid or missing API key.
        '500':
          description: Server error.

